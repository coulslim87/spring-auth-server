<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${form.new ? 'New User' : 'Edit User'} + ' — Admin'">User Form</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container container--narrow">
    <div class="page-header">
        <h1 th:text="${form.new ? 'New User' : 'Edit User: ' + form.username}">User Form</h1>
        <a th:href="@{/admin/users}" class="btn btn-outline">← Back</a>
    </div>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <div class="card">
        <form method="post"
              th:action="${form.new ? '/admin/users/new' : '/admin/users/' + form.id + '/edit'}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="username">Username *</label>
                <input id="username" name="username" type="text" class="form-control"
                       th:value="${form.username}" required minlength="3" maxlength="50"/>
                <span class="field-error" th:if="${#fields.hasErrors('username')}"
                      th:errors="*{username}"></span>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input id="email" name="email" type="email" class="form-control"
                       th:value="${form.email}" required/>
            </div>

            <div class="form-group">
                <label for="password"
                       th:text="${form.new ? 'Password *' : 'New Password (leave blank to keep)'}">Password</label>
                <input id="password" name="password" type="password" class="form-control"
                       th:required="${form.new}" minlength="8"/>
            </div>

            <!-- Roles -->
            <div class="form-group">
                <label>Roles</label>
                <div class="checkbox-group">
                    <label th:each="role : ${allRoles}" class="checkbox-label">
                        <input type="checkbox" name="roles"
                               th:value="${role.name}"
                               th:checked="${form.roles != null and form.roles.contains(role.name)}"/>
                        <span th:text="${role.name.replace('ROLE_','')}"></span>
                    </label>
                </div>
            </div>

            <!-- Status -->
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="enabled" value="true"
                           th:checked="${form.enabled}"/>
                    <span>Account enabled</span>
                </label>
            </div>

            <!-- Reset MFA (edit only) -->
            <div class="form-group" th:if="${!form.new and user != null and user.mfaEnabled}">
                <label class="checkbox-label">
                    <input type="checkbox" name="resetMfa" value="true"/>
                    <span class="text-danger">Reset / disable MFA (user lost their device)</span>
                </label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary"
                        th:text="${form.new ? 'Create User' : 'Save Changes'}">Save</button>
                <a th:href="@{/admin/users}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
