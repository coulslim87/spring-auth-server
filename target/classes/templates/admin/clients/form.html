<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>New OAuth2 Client — Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container container--narrow">
    <div class="page-header">
        <h1>Register OAuth2 Client</h1>
        <a th:href="@{/admin/clients}" class="btn btn-outline">← Back</a>
    </div>

    <div class="alert alert-error"   th:if="${error}"   th:text="${error}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <div class="card">
        <form method="post" th:action="@{/admin/clients/new}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-row">
                <div class="form-group">
                    <label for="clientId">Client ID *</label>
                    <input id="clientId" name="clientId" type="text" class="form-control"
                           placeholder="my-app" required/>
                </div>
                <div class="form-group">
                    <label for="clientSecret">Client Secret *</label>
                    <input id="clientSecret" name="clientSecret" type="text" class="form-control"
                           placeholder="strong-random-secret" required/>
                </div>
            </div>

            <div class="form-group">
                <label for="clientName">Display Name *</label>
                <input id="clientName" name="clientName" type="text" class="form-control"
                       placeholder="My Application" required/>
            </div>

            <div class="form-group">
                <label for="redirectUris">Redirect URIs *
                    <small>(one per line or comma-separated)</small></label>
                <textarea id="redirectUris" name="redirectUris" class="form-control" rows="3"
                          placeholder="https://myapp.com/callback&#10;http://localhost:3000/callback" required></textarea>
            </div>

            <div class="form-group">
                <label for="scopes">Additional Scopes
                    <small>(openid, profile, email always included)</small></label>
                <input id="scopes" name="scopes" type="text" class="form-control"
                       placeholder="read, write, admin"/>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="accessTokenHours">Access Token TTL (hours)</label>
                    <input id="accessTokenHours" name="accessTokenHours" type="number"
                           class="form-control" value="1" min="1" max="24"/>
                </div>
                <div class="form-group">
                    <label for="refreshTokenDays">Refresh Token TTL (days)</label>
                    <input id="refreshTokenDays" name="refreshTokenDays" type="number"
                           class="form-control" value="30" min="1" max="365"/>
                </div>
            </div>

            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="requireConsent" value="true" checked/>
                    <span>Require user consent screen</span>
                </label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Register Client</button>
                <a th:href="@{/admin/clients}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
