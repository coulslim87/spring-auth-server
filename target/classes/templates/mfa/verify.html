<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Verify 2FA — Auth Server</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="auth-page">
<div class="auth-card">
    <div class="auth-logo">🔑</div>
    <h1 class="auth-title">Two-Factor Verification</h1>
    <p class="auth-subtitle">Enter the 6-digit code from your authenticator app.</p>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <form method="post" th:action="@{/mfa/verify}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
            <label for="code">Authentication Code</label>
            <input id="code" name="code" type="text" class="form-control form-control--otp"
                   inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
                   placeholder="000000" required autofocus autocomplete="one-time-code"/>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Verify</button>
    </form>

    <div class="auth-links">
        <a th:href="@{/logout}">Cancel &amp; logout</a>
    </div>
</div>
</body>
</html>
