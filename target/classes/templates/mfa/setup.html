<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Setup 2FA — Auth Server</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="auth-page">
<div class="auth-card auth-card--wide">
    <h1 class="auth-title">Setup Two-Factor Authentication</h1>
    <p class="auth-subtitle">Scan the QR code with your authenticator app (Google Authenticator, Authy, etc.)</p>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <div class="mfa-qr">
        <img th:src="'data:image/png;base64,' + ${qrCode}" alt="QR Code" width="200" height="200"/>
    </div>

    <details class="mfa-manual">
        <summary>Can't scan? Enter the key manually</summary>
        <code th:text="${secret}" class="mfa-secret"></code>
    </details>

    <form method="post" th:action="@{/mfa/setup/confirm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="secret" th:value="${secret}"/>
        <div class="form-group">
            <label for="code">Verification Code</label>
            <input id="code" name="code" type="text" class="form-control form-control--otp"
                   inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
                   placeholder="000000" required autofocus autocomplete="one-time-code"/>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Verify &amp; Enable</button>
    </form>

    <div class="auth-links"><a th:href="@{/account}">Cancel</a></div>
</div>
</body>
</html>
