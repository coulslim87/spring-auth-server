<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>OAuth2 Clients — Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container">
    <div class="page-header">
        <h1>OAuth2 Clients</h1>
        <a th:href="@{/admin/clients/new}" class="btn btn-primary">+ New Client</a>
    </div>
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="card">
        <p class="text-muted" th:if="${info}" th:text="${info}"></p>
        <p>Registered clients are stored in the <code>OAUTH2_REGISTERED_CLIENT</code> table.</p>
        <p>Use the <strong>+ New Client</strong> button to register additional OAuth2 applications.</p>
        <p>The default <strong>demo-client</strong> is seeded on startup.</p>
    </div>
</main>
</body>
</html>
