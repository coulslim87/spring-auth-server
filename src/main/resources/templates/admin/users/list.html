<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Users — Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container">
    <div class="page-header">
        <h1>Users</h1>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">+ New User</a>
    </div>

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <!-- Search -->
    <form method="get" th:action="@{/admin/users}" class="search-bar">
        <input name="q" type="search" placeholder="Search by username or email…"
               th:value="${q}" class="form-control"/>
        <button type="submit" class="btn btn-outline">Search</button>
    </form>

    <!-- Table -->
    <div class="table-wrapper">
        <table class="table">
            <thead>
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Provider</th>
                <th>Roles</th>
                <th>Status</th>
                <th>MFA</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users.content}">
                <td th:text="${user.username}"></td>
                <td th:text="${user.email}"></td>
                <td><span class="badge" th:text="${user.provider}"></span></td>
                <td>
                    <span class="badge badge--role"
                          th:each="role : ${user.roles}"
                          th:text="${role.replace('ROLE_','')}"></span>
                </td>
                <td>
                    <span class="badge" th:classappend="${user.enabled ? 'badge--success' : 'badge--danger'}"
                          th:text="${user.enabled ? 'Active' : 'Disabled'}"></span>
                </td>
                <td th:text="${user.mfaEnabled ? '✅' : '—'}"></td>
                <td th:text="${#temporals.format(user.createdAt,'dd/MM/yyyy')}"></td>
                <td class="actions">
                    <a th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                       class="btn btn-sm btn-outline">Edit</a>
                    <form method="post" th:action="@{/admin/users/{id}/toggle-lock(id=${user.id})}"
                          style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline"
                                th:text="${user.enabled ? 'Disable' : 'Enable'}"></button>
                    </form>
                    <form method="post" th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                          style="display:inline"
                          onsubmit="return confirm('Delete this user?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${users.empty}">
                <td colspan="8" class="text-center text-muted">No users found.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" th:if="${users.totalPages > 1}">
        <a th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
           th:href="@{/admin/users(page=${i}, q=${q})}"
           th:text="${i + 1}"
           th:classappend="${i == users.number ? 'active' : ''}"></a>
    </div>
</main>
</body>
</html>
