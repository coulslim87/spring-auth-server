<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Invalid Link — Auth Server</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="auth-page">
<div class="auth-card">
    <div class="auth-logo">⚠️</div>
    <h1 class="auth-title">Link Expired</h1>
    <p class="auth-subtitle" th:text="${error}">This link is invalid or has expired.</p>
    <a th:href="@{/forgot-password}" class="btn btn-primary btn-block">Request a new link</a>
</div>
</body>
</html>
