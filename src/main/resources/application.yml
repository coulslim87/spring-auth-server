
# Profiles:
# - default: DB2 + JPA + Flyway
# - local-h2: H2 in-memory local (see application-local-h2.yml)
spring:
  datasource:
    url: jdbc:db2://${DB_HOST:localhost}:${DB_PORT:50000}/${DB_NAME:AUTHDB}
    username: ${DB_USERNAME:db2user}
    password: ${DB_PASSWORD:db2pass}
    driver-class-name: com.ibm.db2.jcc.DB2Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.DB2Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # DB2 uses uppercase schema names by default
    schemas: ${DB_SCHEMA:}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: user:email, read:user
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

# Application-specific settings
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  mail:
    from: ${MAIL_FROM:noreply@yourdomain.com}
    from-name: ${MAIL_FROM_NAME:Auth Server}
  admin:
    # Initial admin password - CHANGE THIS on first login
    initial-password: ${ADMIN_INITIAL_PASSWORD:Admin@123!}
  mfa:
    issuer: ${MFA_ISSUER:MyAuthServer}
  password-reset:
    token-expiry-hours: 24
  # RSA key for JWT signing - set to path of JKS keystore for production
  # If not set, a key is generated on startup (NOT suitable for multi-instance or restart)
  jwt:
    keystore-path: ${JWT_KEYSTORE_PATH:}
    keystore-password: ${JWT_KEYSTORE_PASSWORD:}
    key-alias: ${JWT_KEY_ALIAS:authserver}

server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: 30m

logging:
  level:
    org.springframework.security: INFO
    org.springframework.security.oauth2: DEBUG
    com.example.authserver: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
