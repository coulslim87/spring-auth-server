
# Profiles:
# - default: local-h2 (H2 in-memory)
# - db2: DB2 + JPA + Flyway (see application-db2.yml)
# - local-h2: alias local H2 (see application-local-h2.yml)
spring:
  profiles:
    default: local-h2

  datasource:
    url: jdbc:h2:mem:authserver;MODE=DB2;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: user:email, read:user
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

# Application-specific settings
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  mail:
    from: ${MAIL_FROM:noreply@yourdomain.com}
    from-name: ${MAIL_FROM_NAME:Auth Server}
  admin:
    # Initial admin password - CHANGE THIS on first login
    initial-password: ${ADMIN_INITIAL_PASSWORD:Admin@123!}
  mfa:
    issuer: ${MFA_ISSUER:MyAuthServer}
  password-reset:
    token-expiry-hours: 24
  # RSA key for JWT signing - set to path of JKS keystore for production
  # If not set, a key is generated on startup (NOT suitable for multi-instance or restart)
  jwt:
    keystore-path: ${JWT_KEYSTORE_PATH:}
    keystore-password: ${JWT_KEYSTORE_PASSWORD:}
    key-alias: ${JWT_KEY_ALIAS:authserver}

server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: 30m

logging:
  level:
    org.springframework.security: INFO
    org.springframework.security.oauth2: DEBUG
    com.example.authserver: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
